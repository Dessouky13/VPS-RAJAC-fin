version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: rajac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-rajac}
      POSTGRES_USER:     ${POSTGRES_USER:-rajac}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rajac} -d ${POSTGRES_DB:-rajac}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rajac-backend:
    build: .
    container_name: rajac-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # PostgreSQL
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-rajac}
      - POSTGRES_USER=${POSTGRES_USER:-rajac}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # Auth
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin@2025}
      - HR_USERNAME=${HR_USERNAME:-hr}
      - HR_PASSWORD=${HR_PASSWORD:-Hr@2025}
      # School
      - SCHOOL_NAME=${SCHOOL_NAME:-RAJAC Language School}
    volumes:
      - uploads_data:/usr/src/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:
  uploads_data:
