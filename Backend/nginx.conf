# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse-proxy config for the RAJAC Finance Backend
# Place this file at: /etc/nginx/sites-available/rajac-api
# Then: sudo ln -s /etc/nginx/sites-available/rajac-api /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d api.yourdomain.com
# ─────────────────────────────────────────────────────────────────────────────

# Redirect plain HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;         # ← change to your subdomain

    # Let's Encrypt challenge files
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.yourdomain.com;         # ← change to your subdomain

    # ── SSL (managed by Certbot; these paths are filled in automatically) ──
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin"         always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Proxy to Node.js ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — generous for Google Sheets API latency
        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # ── Upload size limit (for Excel student imports) ─────────────────────
    client_max_body_size 20M;

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/rajac-api-access.log;
    error_log  /var/log/nginx/rajac-api-error.log;
}
